name: Deploy dev

# Auto-deploys the `dev` branch to our dev environment (the e2e box) on every
# push. UAT and prod are deployed manually — see CONTRIBUTING.md.

on:
  push:
    branches: [dev]
  workflow_dispatch: {} # allow a manual re-run from the Actions tab

concurrency:
  group: deploy-dev
  cancel-in-progress: false # never interrupt an in-flight deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          username: ${{ secrets.DEV_SSH_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd ~/unilivadmin
            git fetch origin dev
            git checkout -B dev origin/dev
            ./scripts/deploy.sh
